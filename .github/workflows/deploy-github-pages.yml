# Builds the Svelte Kit static site and deploys to GitHub Pages (project site).
# Prerequisite: Repo → Settings → Pages → Build and deployment → Source: "GitHub Actions"
# URL: https://holgerschl.github.io/laserDESK2026/  (repo name must match path)
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Single job (matches GitHub static-site starter): configure → build → upload → deploy
  github-pages:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          SVELTEKIT_BASE_PATH: /laserDESK2026

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build

      - id: deployment
        uses: actions/deploy-pages@v4
