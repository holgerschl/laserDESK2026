# Windows x64 executable for laserdesk_backend (GitHub Releases).
# - Push tag v*: release with that tag name.
# - Push to main (backend/ or this workflow changed): creates Release v0.0.<run_number> so the site download link works
#   without remembering to click “Run workflow”.
# - workflow_dispatch: same as manual run (tag v0.0.<run_number>).
# Path filters apply only to branch pushes; tag pushes always run (GitHub behaviour).
name: Release Windows backend

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'backend/**'
      - '.github/workflows/release-backend-windows.yml'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S backend -B backend/build -G "Visual Studio 17 2022" -A x64

      - name: Build Release
        run: cmake --build backend/build --config Release

      - name: Upload artifact (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: laserdesk_backend-windows-amd64
          path: backend/build/Release/laserdesk_backend.exe

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v0.0.{0}', github.run_number) }}
          files: backend/build/Release/laserdesk_backend.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
