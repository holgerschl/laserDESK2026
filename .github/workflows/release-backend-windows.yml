# Windows x64 executable for laserdesk_backend (GitHub Releases).
# - Push tag v*: release tagged with that version.
# - workflow_dispatch: also creates a Release (tag v0.0.<run_number>) so /releases/latest/download/ works
#   without a manual git tag.
name: Release Windows backend

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S backend -B backend/build -G "Visual Studio 17 2022" -A x64

      - name: Build Release
        run: cmake --build backend/build --config Release

      - name: Upload artifact (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: laserdesk_backend-windows-amd64
          path: backend/build/Release/laserdesk_backend.exe

      - name: Create GitHub Release (tags or manual run)
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v0.0.{0}', github.run_number) || github.ref_name }}
          files: backend/build/Release/laserdesk_backend.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
